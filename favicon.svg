<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background -->
  <rect width="64" height="64" rx="12" fill="#0a0a0a"/>
  
  <!-- Red D block -->
  <rect x="6" y="10" width="26" height="44" rx="6" fill="#e50914"/>
  
  <!-- Letter D white -->
  <text x="11" y="46" font-family="Georgia, serif" font-weight="900" font-size="38" fill="white">D</text>
  
  <!-- FLIX text -->
  <text x="35" y="30" font-family="Arial, sans-serif" font-weight="900" font-size="11" fill="#e50914" letter-spacing="0.5">FLIX</text>
  
  <!-- Decorative line -->
  <rect x="35" y="34" width="22" height="2" rx="1" fill="#e50914" opacity="0.5"/>
  
  <!-- Small dot accent -->
  <circle cx="57" cy="12" r="4" fill="#e50914"/>
</svg>
